name: Skill CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run repository CI checks
        run: python scripts/run_repo_ci.py
