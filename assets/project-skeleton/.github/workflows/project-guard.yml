name: Project Guard

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  governance-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate governance state and gates
        run: python ai/tools/run_project_guard.py .
